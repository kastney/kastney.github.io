# bundle exec jekyll serve --livereload

# General settings
title: '@kastney'

# Collections settings
collections_dir: _collections
collections:
  blog:
    output: true
    permalink: /blog/:name/
  games:
    output: true
    permalink: /games/:name/

# Pagination setting
pagination:
  enabled: true
  debug: false
  permalink: '/:num/'
  limit: 0
  sort_field: 'date'
  sort_reverse: true

# Build settings
plugins:
  - jekyll-paginate-v2